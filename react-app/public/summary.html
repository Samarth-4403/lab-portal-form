<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Annexure-A Data Summary - CSIR Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="summary.css" />
  </head>
  <body>
    <div class="pag-styled-container">
      <!-- Header -->
      <div class="header-section">
        <h1>
          Annexure - A Summary
          <br /><span style="font-size: 0.55em; font-weight: normal; color: #64748b">
            CSIR Lab Manpower Data Report
          </span>
        </h1>
      </div>

      <!-- No Data Alert -->
      <div id="noDataAlert" class="alert alert-danger" style="display: none">
        <span>No data available. Please fill out the form first.</span>
      </div>

      <!-- Summary Cards -->
      <div id="summaryCards" class="summary-cards">
        <div class="summary-card pip-card">
          <div class="card-content">
            <h3>Total PIP</h3>
            <div class="card-value" id="totalPIPValue">0</div>
            <p class="card-description">Persons In Position across all entries</p>
          </div>
        </div>

        <div class="summary-card participation-card">
          <div class="card-content">
            <h3>Labs Reporting</h3>
            <div class="card-value" id="labParticipationValue">0</div>
            <p class="card-description">Number of unique labs with data</p>
          </div>
        </div>

        <div class="summary-card entries-card">
          <div class="card-content">
            <h3>Total Entries</h3>
            <div class="card-value" id="totalEntriesValue">0</div>
            <p class="card-description">Total rows of data submitted</p>
          </div>
        </div>
      </div>

      <!-- Group-wise Summary Cards -->
      <div class="section-title">Group-wise Summary</div>
      <div id="groupSummaryCards" class="stage-summary-grid">
      </div>

      <!-- Actions -->
      <div class="btn-container">
        <button type="button" class="btn-secondary" onclick="printSummary()">
          Print Summary
        </button>
      </div>
    </div>

    <script src="summary.js"></script>
  </body>
</html>
